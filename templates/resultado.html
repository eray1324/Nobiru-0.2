<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | Nobiru</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="resultado-overlay">

    <div class="resultado-modal">

        <div class="resultado-icono">
            🎉
        </div>

        <h1>Cuestionario completado</h1>

        <p class="resultado-subtitulo">
            Estos son tus resultados
        </p>

        <div class="resultado-grid">

            <div class="resultado-card">
                <h2>{{ aciertos }}</h2>
                <span>Aciertos</span>
            </div>

            <div class="resultado-card">
                <h2>{{ errores }}</h2>
                <span>Errores</span>
            </div>

            <div class="resultado-card">
                <h2>{{ puntos }}</h2>
                <span>Puntos</span>
            </div>

        </div>

        <div class="resultado-info">

            <div class="resultado-badge">
                🏅 {{ usuario.insignia|upper }}
            </div>

            <div class="resultado-level">
                ⭐ Nivel {{ usuario.nivel }}
            </div>

        </div>

        <div class="resultado-acciones">

            <a href="{{ url_for('dashboard') }}" class="btn-principal">
                Volver al inicio
            </a>

            <a href="{{ url_for('cuestionarios') }}" class="btn-secundario">
                Resolver otro cuestionario
            </a>

        </div>

    </div>

</div>

</body>
</html>
