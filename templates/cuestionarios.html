<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOBIRU - Cuestionarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="modo-oscuro">
    <div class="contenedor-app">
        <nav class="navbar">
            <div class="navbar-content">
                <h1 class="navbar-logo">NOBIRU</h1>
                <div class="navbar-usuario">
                    <span class="nombre-usuario">👤 Usuario</span>
                    <a href="{{ url_for('logout') }}" class="btn btn-pequeño btn-logout">Salir</a>
                </div>
            </div>
        </nav>

        <div class="menu-lateral">
            <ul class="menu-lista">
                <li><a href="{{ url_for('dashboard') }}" class="menu-item">🏠 Inicio</a></li>
                <li><a href="{{ url_for('cuestionarios') }}" class="menu-item activo">📝 Cuestionarios</a></li>
                <li><a href="{{ url_for('comunidad') }}" class="menu-item">💬 Comunidad</a></li>
                <li><a href="{{ url_for('reels') }}" class="menu-item">🎬 Reels</a></li>
                <li><a href="{{ url_for('biblioteca') }}" class="menu-item">📚 Biblioteca</a></li>
                <li><a href="{{ url_for('favoritos') }}" class="menu-item">⭐ Favoritos</a></li>
            </ul>
        </div>

        <main class="contenido-principal">
            <h2>📝 Cuestionarios</h2>
            
            <div class="acciones-seccion">
                <button class="btn btn-primario">➕ Crear Cuestionario</button>
            </div>

            <div class="cuestionarios-grid">
                {% for cuestionario in cuestionarios %}
                <div class="card-cuestionario">
                    <h3>{{ cuestionario.titulo }}</h3>
                    <p>{{ cuestionario.descripcion }}</p>
                    <p class="categoria">📂 {{ cuestionario.categorias }}</p>
                    <div class="botones-card">
                        <button class="btn btn-pequeño">🎯 Resolver</button>
                        <button class="btn btn-pequeño btn-favorito">⭐ Favorito</button>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
