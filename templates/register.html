<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOBIRU - Registrarse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="modo-oscuro">
    <div class="contenedor-formulario">
        <div class="formulario-card">
            <h1 class="titulo-formulario">Crear Cuenta</h1>
            <p class="subtitulo-formulario">Únete a Nobiru y comienza a mejorar</p>

            <form id="formRegistro" class="formulario">
                <!-- Email -->
                <div class="grupo-input">
                    <label for="email">📧 Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <!-- Nombre de usuario -->
                <div class="grupo-input">
                    <label for="nombre_usuario">👤 Nombre de usuario</label>
                    <input 
                        type="text" 
                        id="nombre_usuario" 
                        name="nombre_usuario" 
                        placeholder="Tu nombre de usuario (sin espacios)"
                        required
                    >
                </div>

                <!-- Nombre completo -->
                <div class="grupo-input">
                    <label for="nombre_completo">👋 Nombre completo (opcional)</label>
                    <input 
                        type="text" 
                        id="nombre_completo" 
                        name="nombre_completo" 
                        placeholder="Tu nombre completo"
                    >
                </div>

                <!-- Mensaje de error -->
                <div id="mensajeError" class="alerta alerta-error" style="display: none;"></div>

                <!-- Botón enviar -->
                <button type="submit" class="btn btn-primario btn-grande">
                    ✨ Crear Cuenta
                </button>
            </form>

            <!-- Link a login -->
            <p class="enlace-alterno">
                ¿Ya tienes cuenta? 
                <a href="{{ url_for('login') }}">Inicia sesión aquí</a>
            </p>

            <!-- Volver -->
            <a href="{{ url_for('index') }}" class="btn btn-volver">
                ← Volver al inicio
            </a>
        </div>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const nombre_usuario = document.getElementById('nombre_usuario').value;
            const nombre_completo = document.getElementById('nombre_completo').value;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        nombre_usuario: nombre_usuario,
                        nombre_completo: nombre_completo
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Redirigir al dashboard
                    window.location.href = data.redirect;
                } else {
                    // Mostrar error
                    document.getElementById('mensajeError').textContent = data.error;
                    document.getElementById('mensajeError').style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('mensajeError').textContent = 'Error al conectar con el servidor';
                document.getElementById('mensajeError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
